<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Music Style Lyric Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap');
        
        :root {
            --lyric-base-size: 24px;
            --lyric-line-height: 1.2;
            --lyric-margin-bottom: 1.5rem;
            --lyric-anim-duration: 2.0s;
            --ui-scale: 1.0; /* UI 크기 조절 변수 추가 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
        }

        #background-blur {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4) saturate(150%);
            z-index: -1;
            transition: background-image 1.5s ease-in-out;
        }

        #lyrics-wrapper {
            position: relative;
            flex: 1;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            touch-action: none;
        }

        #manual-scroll-container {
            width: 100%;
            will-change: transform;
        }

        #lyrics-content {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .lyric-line-wrapper {
            width: 100%;
            margin-bottom: var(--lyric-margin-bottom);
            transition: transform var(--lyric-anim-duration) cubic-bezier(0.16, 1, 0.3, 1) var(--delay, 0s);
            will-change: transform;
        }

        .lyric-line {
            font-size: var(--lyric-base-size); 
            line-height: var(--lyric-line-height);
            font-weight: 700;
            color: rgba(255, 255, 255, 1);
            word-spacing: -0.1em;
            transition: filter 0.8s ease, opacity 0.8s ease, color 0.8s ease;
            will-change: filter, opacity;
            word-break: keep-all; 
            overflow-wrap: break-word;
            max-width: 85%;
            box-sizing: border-box;
            cursor: pointer;
        }

        .lyric-line.active {
            text-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        }

        .glass-modal {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .glass-modal.transparent-mode {
            background: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border-color: transparent !important;
            box-shadow: none !important;
        }
        
        .hide-on-drag {
            transition: opacity 0.3s ease;
        }
        
        .glass-modal.transparent-mode .hide-on-drag {
            opacity: 0;
            pointer-events: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #22c55e;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4b5563;
            border-radius: 2px;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .control-btn {
            transition: transform 0.2s ease, color 0.2s ease;
        }
        .control-btn:active {
            transform: scale(0.9);
        }

        /* 미디어 컨트롤러 크기 조절 및 숨기기 기능 적용 */
        #media-controls {
            transform: translateX(-50%) scale(var(--ui-scale, 1)) !important;
        }
        #media-controls.scale-95 {
            transform: translateX(-50%) scale(calc(var(--ui-scale, 1) * 0.95)) !important;
        }
        body.hide-media-controls #media-controls {
            display: none !important;
        }
    </style>
</head>
<body class="relative flex flex-col h-screen pb-24">

    <script>
        function safeGetItem(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }
        function safeSetItem(key, value) {
            try { localStorage.setItem(key, value); } catch(e) { console.warn("Storage restricted"); }
        }
    </script>

    <div id="background-blur"></div>

                <svg id="icon-fullscreen-exit" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>

            </button>
        </div>

    <script>
        const modalBg = document.getElementById('settings-modal');
        const modalContent = document.getElementById('modal-content');
        const btnSettings = document.getElementById('settings-btn');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const btnSaveSettings = document.getElementById('btn-save-settings');
        const btnPreview = document.getElementById('btn-preview');
        const btnResetUi = document.getElementById('btn-reset-ui');
        
        const btnFullscreen = document.getElementById('fullscreen-btn');
        const iconFsEnter = document.getElementById('icon-fullscreen-enter');
        const iconFsExit = document.getElementById('icon-fullscreen-exit');

        const bgBlur = document.getElementById('background-blur');
        const albumArt = document.getElementById('album-art');
        const trackInfo = document.getElementById('track-info');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        
        const lyricsWrapper = document.getElementById('lyrics-wrapper');
        const manualScrollContainer = document.getElementById('manual-scroll-container');
        const lyricsContent = document.getElementById('lyrics-content');

        const mediaControls = document.getElementById('media-controls');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');

        let currentAccessToken = '';
        let currentSongId = '';
        let isPlaying = false;
        let isPreviewMode = false; 
        let lyricsData = []; 
        let currentProgressMs = 0;
        let lastSyncTime = 0;
        let activeLyricIndex = -1;
        let currentLyricSource = "";
        
        let isPlainLyrics = false;
        let plainScrollSpeed = 20;
        let plainScrollY = 0;
        let lastFrameTime = performance.now();
        let touchStartScrollY = 0;
        
        let pollingInterval = null;
        let animationFrameId = null;

        let animDuration = 2.0;
        let vertPosRatio = 0.4;
        let waveDelay = 0.05; 
        let blurIntensity = 5; 
        let syncOffsetMs = 0; 

        let isSliderDragging = false;
        let currentDraggingSlider = null;

        let targetManualScrollOffset = 0;
        let manualScrollOffset = 0;
        let isManualScrolling = false;
        let manualScrollTimer = null;
        let touchStartY = 0;
        let touchStartOffset = 0;
        let isDragging = false;

        const SP_AUTH_API = "https://accounts.spotify.com/api/token";
        const SP_PLAYER_API = "https://api.spotify.com/v1/me/player";

        let transparencyTimeout;
        function setTransparentMode() {
            if(modalContent) modalContent.classList.add('transparent-mode');
            if(modalBg) {
                modalBg.classList.remove('bg-black/60', 'backdrop-blur-sm');
                modalBg.classList.add('bg-black/0');
            }
            clearTimeout(transparencyTimeout);
        }

        function removeTransparentMode() {
            transparencyTimeout = setTimeout(() => {
                if(modalContent) modalContent.classList.remove('transparent-mode');
                if(modalBg) {
                    modalBg.classList.remove('bg-black/0');
                    modalBg.classList.add('bg-black/60', 'backdrop-blur-sm');
                }
            }, 150);
        }

        window.addEventListener('mouseup', () => {
            isSliderDragging = false;
            currentDraggingSlider = null;
            removeTransparentMode();
            updateLyricStyles(activeLyricIndex);
        });

        window.addEventListener('touchend', () => {
            isSliderDragging = false;
            currentDraggingSlider = null;
            removeTransparentMode();
            updateLyricStyles(activeLyricIndex);
        });

        function setupUIControl(idBase, cssVar, suffix, min, max, step, defaultValue, callback) {
            const slider = document.getElementById(`input-${idBase}`);
            const numField = document.getElementById(`input-${idBase}-num`);
            if(!slider || !numField) return;
            
            slider.min = numField.min = min;
            slider.max = numField.max = max;
            slider.step = numField.step = step;

            const updateValue = (val, save = true) => {
                val = Math.max(min, Math.min(max, Number(val)));
                slider.value = val;
                numField.value = val;
                if (save) safeSetItem(`sp_${idBase}`, val);
                if (cssVar) document.documentElement.style.setProperty(cssVar, `${val}${suffix}`);
                if (callback) callback(val);
            };

            const saved = safeGetItem(`sp_${idBase}`);
            updateValue(saved !== null ? saved : defaultValue, false);

            const handleDragStart = (e) => {
                isSliderDragging = true;
                currentDraggingSlider = e.target.id;
                setTransparentMode();
                updateLyricStyles(activeLyricIndex);
            };

            slider.addEventListener('mousedown', handleDragStart);
            slider.addEventListener('touchstart', handleDragStart, {passive: true});
            
            slider.addEventListener('input', (e) => {
                setTransparentMode();
                updateValue(e.target.value);
            });
            numField.addEventListener('change', (e) => updateValue(e.target.value));
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                if(iconFsEnter) iconFsEnter.classList.add('hidden');
                if(iconFsExit) iconFsExit.classList.remove('hidden');
            } else {
                if(iconFsEnter) iconFsEnter.classList.remove('hidden');
                if(iconFsExit) iconFsExit.classList.add('hidden');
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (document.webkitFullscreenElement) {
                if(iconFsEnter) iconFsEnter.classList.add('hidden');
                if(iconFsExit) iconFsExit.classList.remove('hidden');
            } else {
                if(iconFsEnter) iconFsEnter.classList.remove('hidden');
                if(iconFsExit) iconFsExit.classList.add('hidden');
            }
        });

        function updatePadding() {
            if (lyricsContent && lyricsWrapper) {
                lyricsContent.style.paddingTop = `${lyricsWrapper.clientHeight * vertPosRatio}px`;
                if (!isPlainLyrics && activeLyricIndex !== -1) {
                    const activeWrap = document.getElementById(`lyric-wrap-${activeLyricIndex}`);
                    if (activeWrap) {
                        const translateY = activeWrap.offsetTop - (lyricsWrapper.clientHeight * vertPosRatio) + (activeWrap.clientHeight / 2);
                        const allWraps = document.querySelectorAll('.lyric-line-wrapper');
                        allWraps.forEach(wrap => {
                            wrap.style.setProperty('--delay', '0s'); 
                            wrap.style.transform = `translateY(-${translateY}px)`;
                        });
                    }
                }
            }
        }

        function updateLyricStyles(activeIndex) {
            // 일반 가사일 때는 블러 처리와 포커스 스타일을 모두 해제
            if (isPlainLyrics) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach((line) => {
                    line.style.filter = 'blur(0px)';
                    line.style.opacity = '0.8';
                    line.classList.remove('active');
                });
                return;
            }

            const forceClearBlur = isManualScrolling || (isSliderDragging && currentDraggingSlider !== 'input-blur-amount');
            
            const lines = document.querySelectorAll('.lyric-line');
            lines.forEach((line, index) => {
                const distance = Math.abs(index - activeIndex);
                
                if (forceClearBlur) {
                    line.style.filter = 'blur(0px)';
                    line.style.opacity = distance === 0 ? '1' : '0.6';
                    if (distance === 0) line.classList.add('active');
                    else line.classList.remove('active');
                    return;
                }

                if (distance === 0) {
                    line.style.filter = 'blur(0px)';
                    line.style.opacity = '1';
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                    if (distance === 1) {
                        line.style.filter = `blur(${blurIntensity * 0.25}px)`;
                        line.style.opacity = '0.6';
                    } else if (distance === 2) {
                        line.style.filter = `blur(${blurIntensity * 0.6}px)`;
                        line.style.opacity = '0.3';
                    } else {
                        line.style.filter = `blur(${blurIntensity}px)`;
                        line.style.opacity = '0.1';
                    }
                }
            });
        }

        function activateManualScroll() {
            if (!isManualScrolling) {
                isManualScrolling = true;
                updateLyricStyles(activeLyricIndex);
            }
            clearTimeout(manualScrollTimer);
            manualScrollTimer = setTimeout(() => {
                isManualScrolling = false;
                updateLyricStyles(activeLyricIndex);
            }, 3000);
        }

        if (lyricsWrapper) {
            lyricsWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (isPlainLyrics) {
                    plainScrollY += e.deltaY;
                } else {
                    targetManualScrollOffset += e.deltaY;
                }
                activateManualScroll();
            }, {passive: false});

            lyricsWrapper.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
                if (isPlainLyrics) {
                    touchStartScrollY = plainScrollY;
                } else {
                    touchStartOffset = targetManualScrollOffset;
                }
                isDragging = false;
                activateManualScroll();
            }, {passive: true});

            lyricsWrapper.addEventListener('touchmove', (e) => {
                if (!isManualScrolling) return;
                const deltaY = touchStartY - e.touches[0].clientY;
                if (Math.abs(deltaY) > 10) {
                    isDragging = true;
                    e.preventDefault(); 
                }
                
                if (isPlainLyrics) {
                    plainScrollY = touchStartScrollY + deltaY;
                } else {
                    targetManualScrollOffset = touchStartOffset + deltaY;
                }
                activateManualScroll();
            }, {passive: false});
        }

        function updatePlayPauseIcon() {
            if (isPlaying) {
                if(iconPlay) iconPlay.classList.add('hidden');
                if(iconPause) iconPause.classList.remove('hidden');
            } else {
                if(iconPlay) iconPlay.classList.remove('hidden');
                if(iconPause) iconPause.classList.add('hidden');
            }
        }

        function showMediaControls() {
            if(mediaControls) {
                mediaControls.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');

        function hideMediaControls() {
            if(mediaControls) {
                mediaControls.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
                mediaControls.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
            }
        }

        async function togglePlayPause() {
            if (isPreviewMode) {
                if (isPlaying) {
                    currentProgressMs += (performance.now() - lastSyncTime);
                    isPlaying = false;
                } else {
                    lastSyncTime = performance.now();
                    isPlaying = true;
                }
                updatePlayPauseIcon();
                return;
            }

            if (!currentAccessToken) return;
            const endpoint = isPlaying ? 'pause' : 'play';
            try {
                await fetch(`${SP_PLAYER_API}/${endpoint}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${currentAccessToken}` }
                });
                
                if (isPlaying) {
                    currentProgressMs += (performance.now() - lastSyncTime);
                    isPlaying = false;
                } else {
                    lastSyncTime = performance.now();
                    isPlaying = true;
                }
                updatePlayPauseIcon();
                setTimeout(pollSpotify, 1000);
            } catch (error) {}
        }

        async function skipToNext() {
            if (isPreviewMode) return;
            if (!currentAccessToken) return;
            try {
                await fetch(`${SP_PLAYER_API}/next`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentAccessToken}` }

                setTimeout(pollSpotify, 1000);

        async function skipToPrevious() {

            if (!currentAccessToken) return;
            try {

                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${currentAccessToken}` }
                });

        }

        async function seekSpotify(positionMs) {
            if (!currentAccessToken) return;
            try {
                await fetch(`${SP_PLAYER_API}/seek?position_ms=${positionMs}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${currentAccessToken}` }
                });
                currentProgressMs = positionMs;
                lastSyncTime = performance.now();
                if (!isPlaying) togglePlayPause();

        }

                : "Spotify에서 음악을 재생해주세요.<br><span class='text-sm font-normal'>(일시정지 중이거나 앱이 닫혀있습니다)</span>";

        function cleanTitle(title) {
            return title
                .replace(/\(feat\..*?\)/ig, '')
                .replace(/\[feat\..*?\]/ig, '')
                .replace(/- .*?(Remaster|Live|Radio|Version).*/ig, '')
                .trim();
        }

        async function fetchLrcLib(queryStr, targetArtist, targetDurationSec) {
            try {
                const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(queryStr)}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.length > 0) {
                        const normalize = (str) => str ? str.toLowerCase().replace(/[^a-z0-9가-힣]/g, '') : '';
                        const expectedArtist = normalize(targetArtist);
                        const normalizedQuery = normalize(queryStr);

                        let validSongs = data.filter(song => {
                            const apiArtist = normalize(song.artistName);
                            const isArtistMatch = apiArtist.includes(expectedArtist) || expectedArtist.includes(apiArtist);
                            const isDurationMatch = targetDurationSec && song.duration && Math.abs(song.duration - targetDurationSec) <= 8;

                            if (isArtistMatch || isDurationMatch) return true;
                            if (!normalizedQuery.includes(expectedArtist)) return false;
                            return true;
                        });

                        if (validSongs.length > 0) {
                            const synced = validSongs.find(song => song.syncedLyrics);
                            if (synced) return { type: 'synced', text: synced.syncedLyrics };
                            
                            const plain = validSongs.find(song => song.plainLyrics);
                            if (plain) return { type: 'plain', text: plain.plainLyrics };
                        }
                    }
                }
            } catch (e) {
                console.warn('LRCLIB Fetch Error:', e);
            } 
            return null;
        }

        async function fetchLyrics(title, artist, durationMs) {
            if(!lyricsContent) return;
            
            lyricsContent.innerHTML = `
                <div class="lyric-line-wrapper" style="transform: translateY(0);">
                    <div class="lyric-line text-center mt-[30vh] opacity-50 text-xl" style="max-width:100%; filter:blur(0px); font-size:1.25rem;">
                        LRCLIB 에서 가사를 탐색하는 중입니다...
                    </div>
                </div>`;
                
            lyricsData = [];
            activeLyricIndex = -1;
            currentLyricSource = "";
            isPlainLyrics = false;

            const firstArtist = artist.split(',')[0].trim();
            const cleanedTitle = cleanTitle(title);
            const durationSec = durationMs ? Math.round(durationMs / 1000) : 0;
            
            const queries = [
                `${title} ${firstArtist}`,
                `${cleanedTitle} ${firstArtist}`,
                title,
                cleanedTitle
            ];

            const uniqueQueries = [...new Set(queries)];

            let foundLrc = null;

            for (let q of uniqueQueries) {
                foundLrc = await fetchLrcLib(q, firstArtist, durationSec);
                if (foundLrc) break; 
            }

            if (foundLrc) {
                isPlainLyrics = (foundLrc.type === 'plain');
                currentLyricSource = "LRCLIB" + (isPlainLyrics ? " (Plain Text)" : "");
                
                if (isPlainLyrics) {
                    parsePlainLyrics(foundLrc.text);
                } else {
                    parseLRC(foundLrc.text);
                }
                renderLyrics();
            } else {
                lyricsContent.innerHTML = `
                    <div class="lyric-line-wrapper" style="transform: translateY(0);">
                        <div class="lyric-line text-center mt-[30vh] opacity-50 text-xl" style="max-width:100%; filter:blur(0px); font-size:1.25rem;">
                            해당 곡의 가사를 찾을 수 없습니다.
                        </div>
                    </div>`;
            }
        }

        function parseLRC(lrcText) {
            const lines = lrcText.split('\n');
            const timeRegEx = /\[(\d{2}):(\d{2})(?:\.(\d{1,3}))?\](.*)/;
            
            lyricsData = [];
            for (let line of lines) {
                const match = line.match(timeRegEx);
                if (match) {
                    const min = parseInt(match[1], 10);
                    const sec = parseInt(match[2], 10);
                    let msStr = match[3] || '000';
                    if (msStr.length === 1) msStr += '00';
                    else if (msStr.length === 2) msStr += '0';
                    const ms = parseInt(msStr, 10);
                    const text = match[4].trim();
                    if (text) lyricsData.push({ time: (min * 60 + sec) * 1000 + ms, text: text });
                }
            }
            lyricsData.sort((a, b) => a.time - b.time);
        }

        function parsePlainLyrics(text) {
            const lines = text.split('\n');
            lyricsData = [];
            for (let line of lines) {
                if (line.trim()) {
                    lyricsData.push({ time: 0, text: line.trim() });
                }
            }
        }

        function renderLyrics() {
            if(!lyricsContent || !lyricsWrapper) return;
            lyricsContent.innerHTML = '';
            lyricsContent.style.paddingTop = `${lyricsWrapper.clientHeight * vertPosRatio}px`;
            
            lyricsData.forEach((lyric, index) => {
                const wrap = document.createElement('div');
                wrap.className = 'lyric-line-wrapper';
                wrap.id = `lyric-wrap-${index}`;
                wrap.style.setProperty('--delay', '0s');

                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.id = `lyric-${index}`;
                div.textContent = lyric.text;
                
                div.onclick = () => { 
                    if(isDragging || isPlainLyrics) return; // 일반 가사는 클릭 스킵 무효
                    if(!isPreviewMode) seekSpotify(lyric.time); 
                    
                    targetManualScrollOffset = 0;
                    isManualScrolling = false;
                    updateLyricStyles(activeLyricIndex);
                };
                
                wrap.appendChild(div);
                lyricsContent.appendChild(wrap);
            });

            if (currentLyricSource) {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'text-center text-xs text-gray-500 mt-16 mb-[35vh] opacity-40 uppercase tracking-widest font-normal';
                sourceDiv.textContent = `Lyrics provided by ${currentLyricSource}`;
                lyricsContent.appendChild(sourceDiv);
            }

            if (isPlainLyrics) {
                plainScrollY = 0;
                if (manualScrollContainer) manualScrollContainer.style.transform = `translateY(0px)`;
                const allWraps = document.querySelectorAll('.lyric-line-wrapper');
                allWraps.forEach(wrap => wrap.style.transform = `translateY(0px)`);
                updateLyricStyles(-1); 
            } else {
                manualScrollOffset = 0;
                targetManualScrollOffset = 0;
            }
        }

        function updateProgressLoop() {
            const now = performance.now();
            let deltaTime = now - lastFrameTime;
            if (deltaTime > 100) deltaTime = 16; 
            lastFrameTime = now;

            if (isPlainLyrics) {
                if (isPlaying && !isManualScrolling) {
                    plainScrollY += plainScrollSpeed * (deltaTime / 1000);
                }
                
                if (manualScrollContainer) {
                    manualScrollContainer.style.transform = `translateY(-${plainScrollY}px)`;
                }
            } 
            else {
                if (!isManualScrolling && Math.abs(targetManualScrollOffset) > 0.5) {
                    targetManualScrollOffset += (0 - targetManualScrollOffset) * 0.05; 
                } else if (!isManualScrolling) {
                    targetManualScrollOffset = 0;
                }
                manualScrollOffset += (targetManualScrollOffset - manualScrollOffset) * 0.12;
                
                if (manualScrollContainer) {
                    manualScrollContainer.style.transform = `translateY(-${manualScrollOffset}px)`;
                }

                if (isPlaying && lyricsData.length > 0) {
                    const estimatedProgress = currentProgressMs + (now - lastSyncTime) + syncOffsetMs;

                    if (isPreviewMode && estimatedProgress > 45000) {
                        currentProgressMs = 0;
                        lastSyncTime = performance.now();
                        activeLyricIndex = -1;
                        
                        const allWraps = document.querySelectorAll('.lyric-line-wrapper');
                        allWraps.forEach(wrap => wrap.style.transform = `translateY(0px)`);
                        updateLyricStyles(-1);
                    }

                    let newActiveIndex = -1;
                    for (let i = 0; i < lyricsData.length; i++) {
                        if (estimatedProgress >= lyricsData[i].time) newActiveIndex = i;
                        else break;
                    }

                    if (newActiveIndex !== activeLyricIndex && newActiveIndex !== -1) {
                        const isJump = activeLyricIndex !== -1 && Math.abs(newActiveIndex - activeLyricIndex) > 2;

                        activeLyricIndex = newActiveIndex;
                        const activeWrap = document.getElementById(`lyric-wrap-${activeLyricIndex}`);
                        
                        if (activeWrap) {
                            updateLyricStyles(activeLyricIndex);

                            const offsetTop = activeWrap.offsetTop;
                            const elementCenter = activeWrap.clientHeight / 2;
                            const targetCenter = lyricsWrapper.clientHeight * vertPosRatio;
                            const translateY = offsetTop - targetCenter + elementCenter;

                            const allWraps = document.querySelectorAll('.lyric-line-wrapper');
                            allWraps.forEach((wrap, index) => {
                                if (isJump) {
                                    wrap.style.setProperty('--delay', `0s`);
                                } else {
                                    const distance = Math.abs(index - activeLyricIndex);
                                    const delay = Math.min(distance, 15) * waveDelay; 
                                    wrap.style.setProperty('--delay', `${delay}s`);
                                }
                                wrap.style.transform = `translateY(-${translateY}px)`;
                            });
                        }
                    }
                }
            }

            animationFrameId = requestAnimationFrame(updateProgressLoop);
        }

        function startPreviewMode() {
            isPreviewMode = true;
            if(modalBg) modalBg.classList.add('hidden');
            
            if(pollingInterval) clearInterval(pollingInterval);
            if(animationFrameId) cancelAnimationFrame(animationFrameId);

[00:03.000] 설정에서 재생 컨트롤러의 크기를 늘리거나 줄일 수 있습니다!

[00:18.000] 배경에 깔려있던 가사들의 블러까지 모두 선명한 0으로 초기화됩니다!
[00:21.000] 자, 3초 뒤에 빠르게 넘어가는 구간이 시작됩니다.

[00:35.000] (잠시 후 다시 처음으로 돌아갑니다...)`;

            isPlainLyrics = false;
            currentLyricSource = "PREVIEW MODE (Synced)"; 
            parseLRC(fakeLRC);
            renderLyrics();

            isPlaying = true;

        async function saveSettingsAndStart() {
            const clientIdInput = document.getElementById('input-client-id');
            const clientSecretInput = document.getElementById('input-client-secret');
            const refreshTokenInput = document.getElementById('input-refresh-token');

            if(!clientIdInput || !clientSecretInput || !refreshTokenInput) return;

            const clientId = clientIdInput.value.trim();
            const clientSecret = clientSecretInput.value.trim();
            const refreshToken = refreshTokenInput.value.trim();

            if (!clientId || !clientSecret || !refreshToken) {
                alert('API 필수 정보를 모두 입력해주세요. (체험만 원하시면 UI 미리보기를 눌러주세요)');
                return;
            }

            safeSetItem('sp_client_id', clientId);
            safeSetItem('sp_client_secret', clientSecret);
            safeSetItem('sp_refresh_token', refreshToken);
            
            isPreviewMode = false;
            if(modalBg) modalBg.classList.add('hidden');
            startApp();
        }

        async function startApp() {
            renderEmptyState(true);
            const elem = document.querySelector('.lyric-line');
            if(elem) elem.textContent = 'Spotify 연결 중...';
            
            const success = await refreshAccessToken();
            if (success) {
                if(pollingInterval) clearInterval(pollingInterval);
                if(animationFrameId) cancelAnimationFrame(animationFrameId);
                
                pollSpotify();
                pollingInterval = setInterval(pollSpotify, 3000); 
                lastFrameTime = performance.now();
                updateProgressLoop();
            }
        }

        async function refreshAccessToken() {
            const clientId = safeGetItem('sp_client_id');
            const clientSecret = safeGetItem('sp_client_secret');
            const refreshToken = safeGetItem('sp_refresh_token');
            if(!clientId || !clientSecret || !refreshToken) return false;

            const authString = btoa(`${clientId.trim()}:${clientSecret.trim()}`);
            const bodyStr = `grant_type=refresh_token&refresh_token=${encodeURIComponent(refreshToken.trim())}`;
            
            const fetchOptions = {
                method: 'POST',
                headers: {
                    'Authorization': `Basic ${authString}`,
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: bodyStr
            };

            try {
                let response;
                try {
                    response = await fetch('https://accounts.spotify.com/api/token', fetchOptions);
                } catch(e) {
                    response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://accounts.spotify.com/api/token'), fetchOptions);
                }

                if (!response.ok) throw new Error('Token refresh failed');
                
                const data = await response.json();
                currentAccessToken = data.access_token;
                return true;
            } catch (error) {
                renderEmptyState(true);
                const elem = document.querySelector('.lyric-line');
                if(elem) {
                    elem.innerHTML = '인증 실패.<br>토큰을 확인해주세요.';
                    elem.classList.add('text-red-400');
                }
                if(modalBg) modalBg.classList.remove('hidden');
                return false;
            }
        }

        async function pollSpotify() {
            if (!currentAccessToken || isPreviewMode) return;

            try {
                const response = await fetch(`${SP_PLAYER_API}/currently-playing`, {
                    headers: { 'Authorization': `Bearer ${currentAccessToken}` }
                });

                if (response.status === 204) {
                    isPlaying = false;
                    updatePlayPauseIcon();
                    renderEmptyState(false);
                    return;
                }
                
                if (response.status === 401) {
                    await refreshAccessToken();
                    return;
                }

                const data = await response.json();
                if (!data || !data.item) return;

                showMediaControls();

                if (isPlaying !== data.is_playing) {
                    isPlaying = data.is_playing;
                    updatePlayPauseIcon();
                    if(isPlaying) {
                        lastSyncTime = performance.now();
                        lastFrameTime = performance.now();
                    }
                }
                
                if (isPlaying) {
                    currentProgressMs = data.progress_ms;
                    lastSyncTime = performance.now(); 
                }

                const newSongId = data.item.id;
                
                if (currentSongId !== newSongId) {
                    currentSongId = newSongId;
                    updateTrackUI(data.item.name, data.item.artists[0].name, data.item.album.images[0]?.url);
                    fetchLyrics(data.item.name, data.item.artists[0].name, data.item.duration_ms);
                }
            } catch (error) {}
        }

        function init() {
            const inputClientId = document.getElementById('input-client-id');
            const inputClientSecret = document.getElementById('input-client-secret');
            const inputRefreshToken = document.getElementById('input-refresh-token');

            if(inputClientId) inputClientId.value = safeGetItem('sp_client_id') || '';
            if(inputClientSecret) inputClientSecret.value = safeGetItem('sp_client_secret') || '';
            if(inputRefreshToken) inputRefreshToken.value = safeGetItem('sp_refresh_token') || '';
            
            setupUIControl('sync-offset', null, '', -5000, 5000, 50, 0, (val) => { syncOffsetMs = Number(val); });
            setupUIControl('font-size', '--lyric-base-size', 'px', 16, 64, 1, 24);
            setupUIControl('vert-pos', null, '', 10, 90, 1, 40, (val) => {
                vertPosRatio = val / 100;
                updatePadding();
            });
            setupUIControl('blur-amount', null, '', 0, 20, 1, 5, (val) => { 
                blurIntensity = val; 
                if(activeLyricIndex !== -1) updateLyricStyles(activeLyricIndex); 
            });
            setupUIControl('anim-speed', '--lyric-anim-duration', 's', 0.1, 5.0, 0.1, 2.0, (val) => { animDuration = val; });
            setupUIControl('wave-delay', null, '', 0.00, 1.00, 0.01, 0.05, (val) => { waveDelay = val; });
            setupUIControl('plain-speed', null, '', 0, 100, 1, 20, (val) => { plainScrollSpeed = Number(val); });
            setupUIControl('line-height', '--lyric-line-height', '', 1.0, 3.0, 0.05, 1.2);
            setupUIControl('margin', '--lyric-margin-bottom', 'rem', 0.5, 5.0, 0.1, 1.5);
            
            // 🔥 UI 크기 조절 초기화
            setupUIControl('ui-scale', null, '', 0.5, 2.0, 0.1, 1.0, (val) => { 
                document.documentElement.style.setProperty('--ui-scale', val); 
            });

            // 🔥 재생 컨트롤러 숨기기 초기화
            const checkHideControls = document.getElementById('input-hide-controls');
            if (checkHideControls) {
                const isHiddenSaved = safeGetItem('sp_hide_controls') === 'true';
                checkHideControls.checked = isHiddenSaved;
                if (isHiddenSaved) document.body.classList.add('hide-media-controls');
                
                checkHideControls.addEventListener('change', (e) => {
                    const isHidden = e.target.checked;
                    safeSetItem('sp_hide_controls', isHidden);
                    if (isHidden) {
                        document.body.classList.add('hide-media-controls');
                    } else {
                        document.body.classList.remove('hide-media-controls');
                    }
                });
            }

            if(btnSettings && modalBg) btnSettings.addEventListener('click', () => modalBg.classList.remove('hidden'));
            if(btnCloseModal && modalBg) btnCloseModal.addEventListener('click', () => modalBg.classList.add('hidden'));
            if(btnSaveSettings) btnSaveSettings.addEventListener('click', saveSettingsAndStart);
            if(btnPreview) btnPreview.addEventListener('click', startPreviewMode);
            if(btnFullscreen) btnFullscreen.addEventListener('click', toggleFullScreen);

            if(btnPrev) btnPrev.addEventListener('click', skipToPrevious);
            if(btnNext) btnNext.addEventListener('click', skipToNext);
            if(btnPlayPause) btnPlayPause.addEventListener('click', togglePlayPause);

            if(btnResetUi) {
                btnResetUi.addEventListener('click', () => {
                    const defaultValues = {
                        'sync-offset': 0,
                        'font-size': 24,
                        'vert-pos': 40,
                        'blur-amount': 5,
                        'anim-speed': 2.0,
                        'wave-delay': 0.05,
                        'plain-speed': 20,
                        'line-height': 1.2,
                        'margin': 1.5,
                        'ui-scale': 1.0 // UI 크기 기본값 포함
                    };
                    for (const [key, val] of Object.entries(defaultValues)) {
                        const slider = document.getElementById(`input-${key}`);
                        if(slider) {
                            slider.value = val;
                            slider.dispatchEvent(new Event('input'));
                        }
                    }

                    // 숨기기 토글 기본값 복원
                    if (checkHideControls) {
                        checkHideControls.checked = false;
                        checkHideControls.dispatchEvent(new Event('change'));
                    }
                });
            }

            window.addEventListener('resize', updatePadding);

            if (safeGetItem('sp_refresh_token')) {
                if(modalBg) modalBg.classList.add('hidden');
                startApp();
            } else {
                if(modalBg) modalBg.classList.remove('hidden');
                renderEmptyState(true);
            }
        }

        init();
    </script>
</body>
</html>
